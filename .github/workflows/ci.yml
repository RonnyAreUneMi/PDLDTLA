name: CI - Build & Test

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: Build, lint y tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 coverage

      - name: Lint con flake8 (errores criticos)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,migrations

      - name: Aplicar migraciones (verificacion de modelos)
        run: python manage.py migrate --noinput

      - name: Ejecutar pruebas con cobertura
        run: |
          coverage run --source='estudiantes' manage.py test estudiantes -v 2
          coverage report
          coverage xml -o coverage.xml

      - name: Subir reporte de cobertura como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

      - name: Verificacion final (django check)
        run: python manage.py check --deploy --fail-level WARNING || true

  build-artifact:
    name: Empaquetar artefacto distribuible
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Crear paquete .zip
        run: |
          mkdir -p dist
          zip -r dist/pdldtla-${{ github.sha }}.zip . \
            -x "venv/*" "*.git*" "*__pycache__*" "*.sqlite3" "dist/*"
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pdldtla-build-${{ github.sha }}
          path: dist/pdldtla-${{ github.sha }}.zip
          retention-days: 30
