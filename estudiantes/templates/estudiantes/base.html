{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDLDTLA - Gestion de Estudiantes{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'estudiantes:list' %}">
                PDLDTLA <span class="fw-light opacity-75">| Gestion de Estudiantes</span>
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'estudiantes:list' %}">Estudiantes</a>
                <a class="nav-link" href="{% url 'estudiantes:create' %}">Nuevo</a>
            </div>
        </div>
    </nav>
    <main class="container">
        {% if messages %}
            {% for m in messages %}
                <div class="alert alert-{{ m.tags|default:'info' }} alert-dismissible fade show" role="alert">
                    {{ m }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center text-muted py-4">
        <small>PDLDTLA &middot; Taller de Ingenieria de Software</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
